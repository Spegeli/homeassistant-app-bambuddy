name: Auto-Update BamBuddy Version - DAILY

on:
  schedule:
    - cron: '0 * * * *'  # stündlich
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Get latest daily digest from ghcr.io
        id: get_digest
        run: |
          TOKEN=$(curl -s "https://ghcr.io/token?scope=repository:maziggy/bambuddy:pull" \
            | jq -r '.token')

          DIGEST=$(curl -sI -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
            "https://ghcr.io/v2/maziggy/bambuddy/manifests/daily" \
            | grep -i "docker-content-digest" | tr -d '\r' | awk '{print $2}')

          if [ -z "$DIGEST" ]; then
            echo "ERROR: Digest konnte nicht abgerufen werden!"
            exit 1
          fi

          SHORT=$(echo "$DIGEST" | cut -c8-15)
          DATE=$(date +%Y.%m.%d)
          NEW_VERSION="${DATE}-${SHORT}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Neue Version: $NEW_VERSION"

      - name: Get current version from config.yaml
        id: get_current
        run: |
          CURRENT=$(grep '^version:' bambuddy-daily/config.yaml | sed 's/.*"\(.*\)"/\1/')
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Aktuelle Version: $CURRENT"

      - name: Update config.yaml
        if: steps.get_digest.outputs.version != steps.get_current.outputs.current
        run: |
          sed -i 's/^version: ".*"/version: "${{ steps.get_digest.outputs.version }}"/' bambuddy-daily/config.yaml
          echo "config.yaml aktualisiert auf ${{ steps.get_digest.outputs.version }}"

      - name: Update CHANGELOG.md
        if: steps.get_digest.outputs.version != steps.get_current.outputs.current
        run: |
          python3 - <<'PYEOF'
          import os
          version = os.environ.get("NEW_VERSION", "")
          with open("bambuddy-daily/CHANGELOG.md", "w") as f:
              f.write(f"## {version}\n\nLatest daily build from ghcr.io/maziggy/bambuddy:daily\n\n")
          print("CHANGELOG.md aktualisiert")
          PYEOF
        env:
          NEW_VERSION: ${{ steps.get_digest.outputs.version }}

      - name: Commit and push
        if: steps.get_digest.outputs.version != steps.get_current.outputs.current
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bambuddy-daily/config.yaml bambuddy-daily/CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: update BamBuddy Daily ${{ steps.get_current.outputs.current }} → ${{ steps.get_digest.outputs.version }}"
          git push
