name: Auto-Update BamBuddy Version - DAILY BETA

on:
  #schedule:
  #  - cron: '0 * * * *'  # stündlich
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Get latest version from GitHub Releases
        id: get_version
        run: |
          LATEST="daily"
          BODY="Latest daily build from ghcr.io/maziggy/bambuddy:daily"
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Gefundene Version: $LATEST"

      - name: Update build.yaml und config.yaml
        run: |
          sed -i 's/BAMBUDDY_VERSION: ".*"/BAMBUDDY_VERSION: "daily"/' bambuddy/build.yaml
          sed -i 's/^version: ".*"/version: "daily"/' bambuddy/config.yaml

      - name: Update CHANGELOG.md
        run: |
          python3 - <<'PYEOF'
          with open("bambuddy/CHANGELOG.md", "w") as f:
              f.write("## daily\n\nLatest daily build from ghcr.io/maziggy/bambuddy:daily\n\n")
          print("CHANGELOG.md aktualisiert")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bambuddy/build.yaml bambuddy/config.yaml bambuddy/CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: set BamBuddy to daily build"
          git push
