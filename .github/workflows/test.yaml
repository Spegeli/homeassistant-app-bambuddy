name: TEST WORKFLOW

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Get current daily digest from ghcr.io
        id: get_digest
        run: |
          TOKEN=$(curl -s "https://ghcr.io/token?scope=repository:maziggy/bambuddy:pull" \
            | jq -r '.token')

          # Digest direkt aus dem Response-Header holen
          DIGEST=$(curl -sI -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
            "https://ghcr.io/v2/maziggy/bambuddy/manifests/daily" \
            | grep -i "docker-content-digest" | tr -d '\r' | awk '{print $2}')

          echo "=== DIGEST AUS HEADER ==="
          echo "$DIGEST"
          echo "========================="

          # Kurzer Hash (Zeichen 8-15 nach sha256:)
          SHORT=$(echo "$DIGEST" | cut -c8-15)
          echo "Kurzer Hash: $SHORT"

          DATE=$(date +%Y.%m.%d)
          echo "version=${DATE}-${SHORT}" >> $GITHUB_OUTPUT
          echo "Neue Version: ${DATE}-${SHORT}"
