name: TEST WORKFLOW

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Get daily release info from GitHub
        run: |
          echo "=== ALLE RELEASES (erste 5) ==="
          curl -s "https://api.github.com/repos/maziggy/bambuddy/releases?per_page=5" \
            | jq '[.[] | {tag_name, name, prerelease, body: .body[:200]}]'
          
          echo "=== NUR PRE-RELEASES ==="
          curl -s "https://api.github.com/repos/maziggy/bambuddy/releases?per_page=10" \
            | jq '[.[] | select(.prerelease == true) | {tag_name, name, prerelease, body: .body[:200]}]'
