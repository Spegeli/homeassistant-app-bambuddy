name: Auto-Update BamBuddy Version

on:
  schedule:
    - cron: '0 6 * * *'  # täglich um 06:00 UTC
  workflow_dispatch:

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest version from GitHub Releases
        id: get_version
        run: |
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/maziggy/bambuddy/releases/latest")
          LATEST=$(echo "$RELEASE_JSON" | jq -r '.tag_name' | sed 's/^v//')
          BODY=$(echo "$RELEASE_JSON" | jq -r '.body')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          # Multiline body sicher speichern
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Gefundene Version: $LATEST"

      - name: Get current version from build.yaml
        id: get_current
        run: |
          CURRENT=$(grep 'BAMBUDDY_VERSION' build.yaml | sed 's/.*"\(.*\)"/\1/')
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Aktuelle Version: $CURRENT"

      - name: Update build.yaml und config.yaml
        if: steps.get_version.outputs.latest != '' && steps.get_version.outputs.latest != steps.get_current.outputs.current
        run: |
          sed -i 's/BAMBUDDY_VERSION: ".*"/BAMBUDDY_VERSION: "${{ steps.get_version.outputs.latest }}"/' build.yaml
          sed -i 's/^version: ".*"/version: "${{ steps.get_version.outputs.latest }}"/' config.yaml
          echo "Beide Dateien aktualisiert auf ${{ steps.get_version.outputs.latest }}"

      - name: Update CHANGELOG.md
        if: steps.get_version.outputs.latest != '' && steps.get_version.outputs.latest != steps.get_current.outputs.current
        run: |
          NEW_VERSION="${{ steps.get_version.outputs.latest }}"
          NEW_BODY="${{ steps.get_version.outputs.body }}"
          
          # Neuen Eintrag als Datei schreiben
          printf "## %s\n\n%s\n\n" "$NEW_VERSION" "$NEW_BODY" > /tmp/new_entry.md
          
          # Mit altem Inhalt zusammenführen
          if [ -f CHANGELOG.md ]; then
            cat /tmp/new_entry.md CHANGELOG.md > /tmp/merged.md
            mv /tmp/merged.md CHANGELOG.md
          else
            mv /tmp/new_entry.md CHANGELOG.md
          fi
          echo "CHANGELOG.md aktualisiert"

      - name: Commit and push
        if: steps.get_version.outputs.latest != '' && steps.get_version.outputs.latest != steps.get_current.outputs.current
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.yaml config.yaml CHANGELOG.md
          git commit -m "chore: update BamBuddy ${{ steps.get_current.outputs.current }} → ${{ steps.get_version.outputs.latest }}"
          git push
